spring:
  application:
    name: cv-analysis-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cv_analysis}
    username: ${SPRING_DATASOURCE_USERNAME:cv_user}
    password: ${SPRING_DATASOURCE_PASSWORD:cv_pass}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.postgresql.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:ton.gmail@gmail.com}
    password: ${MAIL_PASSWORD:ton_app_password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

server:
  port: ${SERVER_PORT:8082}
  servlet:
    context-path: /api

jwt:
  secret: ${JWT_SECRET:4c7f9a2b8e1d0f3c6b5a9e2d1c3b4a6f7e8d9c0b1a2f3e4d5c6b7a8e9f0d1c2a7b9d3e5f1c4a6b8d0e2f4c6a8b0d2f4}
  expiration: 86400000  # 24 heures en millisecondes
  refresh-expiration: 604800000  # 7 jours

fastapi:
  url: ${FASTAPI_URL:http://localhost:8000}

# ===== Config email admin =====
brevo:
  admin-email: ${ADMIN_EMAIL:fonsibelhajmassoud@gmail.com}

# ===== URLs application =====
app:
  base-url: ${APP_BASE_URL:http://localhost:8082/api}
  frontend-url: ${APP_FRONTEND_URL:http://localhost:4200}

logging:
  level:
    root: INFO
    com.cvanalysis: DEBUG
