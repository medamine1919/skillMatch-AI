<div class="register-container">
  <div class="register-card">
    <h2>Mot de passe oublié</h2>
    <p class="subtitle">Entrez votre email : nous vous enverrons un lien de réinitialisation.</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div *ngIf="message" class="success-message">{{ message }}</div>
      <div *ngIf="error" class="error-message">{{ error }}</div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          class="form-control"
          [class.is-invalid]="submitted && f['email'].errors"
          formControlName="email"
          placeholder="votre@email.com"
        />
        <div *ngIf="submitted && f['email'].errors" class="invalid-feedback">
          <span *ngIf="f['email'].errors['required']">Email requis</span>
          <span *ngIf="f['email'].errors['email']">Email invalide</span>
        </div>
      </div>

      <button type="submit" class="btn btn-primary" [disabled]="loading">
        <span *ngIf="!loading">Envoyer le lien</span>
        <span *ngIf="loading">Envoi en cours...</span>
      </button>
    </form>

    <p class="login-link">
      <a routerLink="/auth/login">Retour à la connexion</a>
    </p>
  </div>
</div>
